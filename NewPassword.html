<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSync Inc.</title>
    <link rel="stylesheet" href="Css/NewPassword.css">
</head>
<body>
    <!-- Site Header -->
    <header>
        <img src="img/HSlogo.png" class="logo">
        <!-- Primary Navigation -->
        <nav>
            <a href="Login.html">Home</a>
            <a href="plans.html">Plans</a>
            <a href="contact.html">Contact</a>
            <a href="about.html">About Us</a>
        </nav>
    </header>
    <!-- Main Content -->
    <section class="hero-banner">
        <!-- New Password Form -->
        <form class="new-password-card" id="newPasswordForm">
            <h2>New Password</h2>
            <!-- New Password Field -->
            <div class="input-password-group">
                <label>New Password:</label>
                <div class="password-wrapper">
                    <input type="password"  id="passwordinput" placeholder="Enter your password">
                    <div class="eyes">
                        <img src="img/hide.png" class="show-hide" id="passwordEye">
                    </div>
                </div>
            </div>
            <!-- Confirm Password Field -->
            <div class="input-password-group">
                <label>Confirm Password:</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmpasswordinput" placeholder="Confirm Password">
                    <div class="eyes">
                        <img src="img/hide.png" class="show-hide" id="confirmEye">
                    </div>
                </div>
            </div>
            <!-- Submit Button -->
            <div class="btn">
                <button class="submit-btn" id="submitbtn">Submit</button>
            </div>
            <!-- Login Option -->
            <div class="login-option">
                <span class="haveaccount">Already have an account?</span>
                <a href="Login.html" class="loginlink">Login</a>
            </div>

        </form>
    </section>
    <!-- Footer -->
    <footer>
        © 2026 HealthSync Inc. | All Rights Reserved
    </footer>
    <!-- Scripts -->
    <script src="Js/auth.js"></script>
    <script src="Js/NewPassword.js"></script>
</body>
</html>
